name: Action

on:
  watch:
    types: [started]
#  push:
#    branches: [ master ]
#  pull_request:
#    branches: [ master ]
   
env:
  WeTransfer: true

jobs:
    build:
      runs-on: ubuntu-20.04

      steps:
        - name: 获取本仓库源码
          uses: actions/checkout@main
  
        - name: 清理环境
          run: |
             cd /
             git clone https://github.com/meizuosc/m681 out
             make ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- O=`pwd`/out m3note_defconfig
             make -j8 ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- O=`pwd`/out
             
        - name: 上传至WeTransfer
          if: env.WeTransfer == 'true'            
          run: |
             sudo ./transfer wet 666.zip
